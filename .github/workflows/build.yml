name: Build Windows installer

# Builds the .exe on a public CI runner (required for SignPath Foundation's free
# OSS code signing: the binary must be provably built from this public source).
# Push a tag like v2.4.1 -> installer is built and attached to a GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # allows manual runs from the Actions tab (no tag needed)

permissions:
  contents: write # needed to create the Release and upload the installer

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        # --publish never: electron-builder must not try to push to the `generic`
        # provider (it is download-only); the Release step below handles upload.
        run: npx electron-builder --win --publish never

      # Manifest for the launcher's installer-free self-update (zip swap).
      - name: Generate portable update manifest
        run: |
          $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $zip = Get-Item "release/Nebula-Setup-$ver.zip"
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA512).Hash.ToLower()
          $json = [ordered]@{ version = $ver; zip = $zip.Name; sha512 = $hash; size = $zip.Length } | ConvertTo-Json
          # UTF-8 *without* BOM - a BOM would break JSON.parse in the launcher
          [System.IO.File]::WriteAllText("$PWD/release/portable.json", $json, [System.Text.UTF8Encoding]::new($false))
          Get-Content release/portable.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nebula-windows
          path: |
            release/Nebula-Setup-*.exe
            release/Nebula-Setup-*.exe.blockmap
            release/Nebula-Setup-*.zip
            release/portable.json
            release/latest.yml
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/Nebula-Setup-*.exe
            release/Nebula-Setup-*.exe.blockmap
            release/Nebula-Setup-*.zip
            release/portable.json
            release/latest.yml

      # Keep only the release for the tag that was just built.
      - name: Prune older releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $keep = "${{ github.ref_name }}"
          gh release list --limit 200 --json tagName --jq ".[].tagName" | ForEach-Object {
            $tag = $_.Trim()
            if ($tag -and $tag -ne $keep) {
              Write-Host "deleting release $tag"
              gh release delete $tag --yes --cleanup-tag
            }
          }
